server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/family?useSSL=false&characterEncoding=UTF-8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  mybatis-plus:
    mapper-locations: classpath*:mapper/**/*.xml
    type-aliases-package: com.family.app.entity
    configuration:
      log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
logging:
  level:
    com.family.app: INFO
